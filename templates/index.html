<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Playlist Extractor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo svg { flex-shrink: 0; }

    .logo-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.8rem;
      color: #777;
      margin-top: 2px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ff4444; }
    input[type="text"]::placeholder { color: #555; }

    button {
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover:not(:disabled) { background: #cc0000; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status area */
    #status-area {
      display: none;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #2a2a2a;
    }

    #status-area.processing {
      display: block;
      background: #111;
      border-color: #333;
    }

    #status-area.done {
      display: block;
      background: #0d2b14;
      border-color: #1a5c2a;
    }

    #status-area.error {
      display: block;
      background: #2b0d0d;
      border-color: #5c1a1a;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .status-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .processing .status-icon { background: #222; }
    .done .status-icon { background: #1a5c2a; }
    .error .status-icon { background: #5c1a1a; }

    .status-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .status-sub {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    .done .status-sub { color: #4caf50; }
    .error .status-sub { color: #f44336; }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #333;
      border-top-color: #ff4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    .progress-bar-wrap {
      background: #222;
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-bar-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #ff4444, #ff8888);
      border-radius: 6px;
      animation: progress 1.4s ease-in-out infinite;
    }

    @keyframes progress {
      0%   { width: 10%; margin-left: 0; }
      50%  { width: 40%; margin-left: 30%; }
      100% { width: 10%; margin-left: 90%; }
    }

    /* Download button */
    .btn-download {
      background: #1e7e34;
      margin-top: 14px;
      width: 100%;
      justify-content: center;
      font-size: 0.95rem;
      padding: 14px;
      border-radius: 10px;
    }

    .btn-download:hover:not(:disabled) { background: #155d27; }

    /* Counter badge */
    .badge {
      background: #1a5c2a;
      color: #4caf50;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: auto;
    }

    .error-msg {
      font-size: 0.82rem;
      color: #f44336;
      margin-top: 8px;
      line-height: 1.5;
    }

    .hint {
      font-size: 0.78rem;
      color: #555;
      margin-top: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#ff0000"/>
        <path d="M28 20L16 27V13L28 20Z" fill="white"/>
      </svg>
      <div class="logo-text">
        <h1>Playlist URL Extractor</h1>
        <p>Extrai todas as URLs de uma playlist do YouTube</p>
      </div>
    </div>

    <label for="url-input">URL da Playlist</label>
    <div class="input-group">
      <input
        type="text"
        id="url-input"
        placeholder="https://www.youtube.com/playlist?list=..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="extract-btn" onclick="startExtraction()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Extrair
      </button>
    </div>

    <!-- Status area -->
    <div id="status-area">
      <!-- conteúdo injetado via JS -->
    </div>

    <p class="hint">
      ⚙️ Funciona com playlists públicas do YouTube.<br>
      O arquivo gerado contém uma URL por linha, pronto para uso.
    </p>
  </div>

  <script>
    let pollingInterval = null;

    function startExtraction() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) {
        showError('Cole a URL da playlist antes de continuar.');
        return;
      }

      setLoading(true);
      showProcessing();

      fetch('/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) { showError(data.error); setLoading(false); return; }
        pollStatus(data.job_id);
      })
      .catch(() => {
        showError('Erro de comunicação com o servidor.');
        setLoading(false);
      });
    }

    function pollStatus(jobId) {
      pollingInterval = setInterval(() => {
        fetch(`/status/${jobId}`)
          .then(r => r.json())
          .then(data => {
            if (data.status === 'done') {
              clearInterval(pollingInterval);
              showDone(data.count, jobId);
              setLoading(false);
            } else if (data.status === 'error') {
              clearInterval(pollingInterval);
              showError(data.error || 'Erro ao processar a playlist.');
              setLoading(false);
            }
          })
          .catch(() => {
            clearInterval(pollingInterval);
            showError('Perda de conexão com o servidor.');
            setLoading(false);
          });
      }, 2000);
    }

    function showProcessing() {
      const el = document.getElementById('status-area');
      el.className = 'processing';
      el.innerHTML = `
        <div class="status-header">
          <div class="status-icon"><div class="spinner"></div></div>
          <div>
            <div class="status-title">Processando playlist...</div>
            <div class="status-sub">Isso pode levar alguns segundos</div>
          </div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
      `;
    }

    function showDone(count, jobId) {
      const el = document.getElementById('status-area');
      el.className = 'done';
      el.innerHTML = `
        <div class="status-header">
          <div class="status-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#4caf50" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <div>
            <div class="status-title">Extração concluída!</div>
            <div class="status-sub">${count} URLs encontradas</div>
          </div>
          <span class="badge">${count} URLs</span>
        </div>
        <button class="btn-download" onclick="window.location.href='/download/${jobId}'">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Baixar playlist_urls.txt
        </button>
      `;
    }

    function showError(msg) {
      const el = document.getElementById('status-area');
      el.className = 'error';
      el.innerHTML = `
        <div class="status-header">
          <div class="status-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#f44336" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </div>
          <div>
            <div class="status-title">Erro ao processar</div>
            <div class="status-sub">Verifique a URL e tente novamente</div>
          </div>
        </div>
        <div class="error-msg">${msg}</div>
      `;
    }

    function setLoading(loading) {
      const btn = document.getElementById('extract-btn');
      btn.disabled = loading;
      btn.innerHTML = loading
        ? `<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Processando...`
        : `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
             <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
           </svg> Extrair`;
    }

    // Permite usar Enter no input
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startExtraction();
    });
  </script>
</body>
</html>

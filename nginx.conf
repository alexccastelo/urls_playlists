server {
    listen 80;
    server_name seu-dominio.com;  # substitua pelo seu domínio ou IP da VPS

    # Logs (aaPanel já gerencia, mas deixamos explícito)
    access_log  /www/wwwlogs/urls_playlists.log;
    error_log   /www/wwwlogs/urls_playlists.error.log;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Bloqueia acesso a arquivos sensíveis do projeto
    location ~ /\.(git|env|sh) {
        deny all;
        return 404;
    }
}
